server:
  port: 18080
spring:
  application:
    name: plan-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_URL}
    username: ${DB_USERNAME:plan}
    password: ${DB_PASSWORD:plan}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
#    properties:
#      hibernate:
#        show_sql: ${JPA_SHOW_SQL:false}
#        format_sql: false
jwt:
  internal-secret: ${JWT_INTERNAL_SECRET}

## 로컬 설정
eureka:
  client:
    service-url:
            defaultZone: ${defaultZone:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
        instance-id:
          ${spring.cloud.client.hostname}:${spring.application.instance_id:${random.value}}

